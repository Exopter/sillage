<!-- @dsCard group="Components" viewport="700x340" name="Feedback & status" subtitle="Badge, StatusDot, Toast" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:24px;color:var(--text-body)}
  .group{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
  .gl{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
  .row{display:flex;flex-wrap:wrap;gap:14px;align-items:center}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Badge, StatusDot, Toast } = window.ExopterDesignSystem_4c9fc9;
    const I = (d) => <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}} />;
    const I20 = (d) => <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}} />;
    const check = I('<path d="M20 6 9 17l-5-5"/>');
    const alert = I20('<path d="M10.3 3.9 1.8 18a2 2 0 0 0 1.7 3h17a2 2 0 0 0 1.7-3L13.7 3.9a2 2 0 0 0-3.4 0Z"/><path d="M12 9v4"/><path d="M12 17h.01"/>');
    const synced = I20('<path d="M20 6 9 17l-5-5"/>');

    function Demo(){
      return (
        <div>
          <div className="group"><span className="gl">Badge</span>
            <div className="row">
              <Badge tone="ready" icon={check}>Ready</Badge>
              <Badge tone="live">Live</Badge>
              <Badge tone="caution">Pending</Badge>
              <Badge tone="fault">Fault</Badge>
              <Badge tone="info">Sync</Badge>
              <Badge tone="solid">GLD</Badge>
              <Badge tone="neutral">T0+06</Badge>
            </div>
          </div>
          <div className="group"><span className="gl">StatusDot</span>
            <div className="row">
              <StatusDot state="ready" />
              <StatusDot state="live" pulse label="Streaming" />
              <StatusDot state="pending" />
              <StatusDot state="caution" />
              <StatusDot state="fault" />
              <StatusDot state="unknown" label="No data" />
            </div>
          </div>
          <div className="group"><span className="gl">Toast</span>
            <div className="row" style={{alignItems:'stretch'}}>
              <Toast tone="ready" title="FDR-118 synced" icon={synced} onClose={()=>{}}>Flight data uploaded · integrity verified.</Toast>
              <Toast tone="fault" title="Sensor fault" icon={alert} onClose={()=>{}}>Pitot pressure lost — do not rely on airspeed.</Toast>
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
