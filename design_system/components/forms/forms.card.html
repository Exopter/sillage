<!-- @dsCard group="Components" viewport="700x430" name="Forms & controls" subtitle="Button, IconButton, Input, Select, Switch, SegmentedControl" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="../../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:24px;color:var(--text-body)}
  .group{display:flex;flex-direction:column;gap:10px;margin-bottom:22px}
  .group:last-child{margin-bottom:0}
  .gl{font-family:var(--font-mono);font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
  .row{display:flex;flex-wrap:wrap;gap:12px;align-items:flex-end}
</style>
</head>
<body>
  <div id="root"></div>
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin></script>
  <script src="../../_ds_bundle.js"></script>
  <script type="text/babel" data-presets="react">
    const { Button, IconButton, Input, Select, Switch, SegmentedControl } = window.ExopterDesignSystem_4c9fc9;
    // Minimal inline Lucide-style icons for the demo
    const I = (d) => <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}} />;
    const playI = I('<polygon points="6 3 20 12 6 21 6 3"/>');
    const replayI = I('<path d="M3 12a9 9 0 1 0 3-6.7L3 8"/><path d="M3 3v5h5"/>');
    const abortI = I('<path d="m8.7 2 6.6 0 4.7 4.7 0 6.6-4.7 4.7-6.6 0-4.7-4.7 0-6.6z"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/>');
    const dlI = I('<path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/>');

    function Demo(){
      return (
        <div>
          <div className="group"><span className="gl">Button — variants & sizes</span>
            <div className="row">
              <Button variant="primary" iconLeft={playI}>Arm system</Button>
              <Button variant="secondary" iconLeft={replayI}>Replay T0</Button>
              <Button variant="ghost">Cancel</Button>
              <Button variant="danger" iconLeft={abortI}>Abort</Button>
            </div>
            <div className="row">
              <Button size="sm">Small</Button>
              <Button size="md">Medium</Button>
              <Button size="lg" iconLeft={dlI}>Export FDR</Button>
              <Button disabled>Disabled</Button>
            </div>
          </div>
          <div className="group"><span className="gl">IconButton</span>
            <div className="row">
              <IconButton icon={playI} variant="solid" round label="Play" />
              <IconButton icon={dlI} variant="outline" label="Export" />
              <IconButton icon={replayI} variant="ghost" label="Replay" />
              <IconButton icon={abortI} variant="danger" label="Abort" />
            </div>
          </div>
          <div className="group"><span className="gl">Inputs, Select & Switch</span>
            <div className="row" style={{alignItems:'flex-start'}}>
              <div style={{width:170}}><Input label="Pilot mass" data suffix="kg" defaultValue="88" hint="Target 80–95" /></div>
              <div style={{width:170}}><Input label="Exit altitude" data suffix="m" error="Above 5000 m" defaultValue="5400" /></div>
              <div style={{width:170}}><Select label="Pilot" options={[{value:'1',label:'A. Renaud'},{value:'2',label:'M. Olsen'}]} /></div>
              <div style={{paddingTop:24}}><Switch label="Record FDR" defaultChecked /></div>
            </div>
          </div>
          <div className="group"><span className="gl">SegmentedControl — mode switcher</span>
            <div className="row">
              <SegmentedControl ariaLabel="Mode" defaultValue="gld"
                options={[{value:'gld',label:'GLD'},{value:'edf',label:'EDF'},{value:'jet',label:'JET',disabled:true}]} />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>
</body>
</html>
