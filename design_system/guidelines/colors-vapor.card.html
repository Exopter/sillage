<!-- @dsCard group="Colors" viewport="700x150" name="Vapor scale" subtitle="Light base & white-mark equivalent — backgrounds, panels, dividers" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-5)}
  .row{display:flex;gap:var(--sp-3)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--sp-2)}
  .chip{height:56px;border-radius:var(--radius);border:1px solid var(--border-rule)}
  .name{font-family:var(--font-mono);font-size:var(--fs-xs);font-weight:500;color:var(--text-body)}
  .hex{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ex-white)"></div><span class="name">white</span><span class="hex">#FFFFFF</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-vapor-50)"></div><span class="name">vapor-50</span><span class="hex">#F5F8F6</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-vapor-100)"></div><span class="name">vapor-100</span><span class="hex">#E5ECE9</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-vapor-200)"></div><span class="name">vapor-200</span><span class="hex">#D2DCD8</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-graphite-400)"></div><span class="name">graphite-400</span><span class="hex">#97A1A0</span></div>
  </div>
</body></html>
