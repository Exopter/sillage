<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;gap:var(--sp-4);padding:var(--sp-4);background:var(--surface-app)}
  .panel{flex:1;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;border:1px solid var(--border-rule)}
  .carbon{background:var(--ex-carbon-950);color:var(--ex-white)}
  .vapor{background:var(--ex-vapor-50);color:var(--ex-carbon-950)}
  .panel img{width:200px}
  .tag{position:absolute;margin:8px;font-family:var(--font-mono);font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--text-muted)}
</style></head>
<body>
  <div class="panel carbon"><img src="../assets/logo-wordmark.svg" alt="EXOPTER"></div>
  <div class="panel vapor"><img src="../assets/logo-wordmark.svg" alt="EXOPTER"></div>
</body></html>
