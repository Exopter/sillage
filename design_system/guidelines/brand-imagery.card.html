<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-4)}
  .frame{position:relative;border-radius:var(--radius);overflow:hidden;border:1px solid var(--border-rule);height:200px}
  .frame img{width:100%;height:100%;object-fit:cover;display:block}
  .cap{position:absolute;left:0;bottom:0;right:0;padding:var(--sp-3) var(--sp-4);background:linear-gradient(transparent,rgba(7,11,13,.7));color:var(--ex-white)}
  .cap .t{font-family:var(--font-mono);font-size:var(--fs-xs);letter-spacing:.08em;text-transform:uppercase}
</style></head>
<body>
  <div class="frame">
    <img src="../assets/exopter-wing-reference.jpeg" alt="Exopter rigid wing on a grass field">
    <div class="cap"><span class="t">Exowing GLD · field reference · matte carbon, white markings</span></div>
  </div>
</body></html>
