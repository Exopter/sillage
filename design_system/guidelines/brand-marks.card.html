<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);display:flex;gap:var(--sp-5);padding:var(--sp-5);background:var(--surface-app);align-items:center}
  .cell{display:flex;flex-direction:column;align-items:center;gap:var(--sp-2)}
  .tile{height:72px;display:flex;align-items:center;justify-content:center}
  .carbon{background:var(--ex-carbon-950);border-radius:var(--radius);padding:0 var(--sp-5)}
  .exo{color:var(--ex-white);height:40px}
  .icon{width:72px;height:72px}
  .aero{color:var(--ex-carbon-900);width:130px}
  .n{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="cell"><div class="tile carbon"><img class="exo" src="../assets/logo-exo.svg" alt="EXO"></div><span class="n">EXO mark</span></div>
  <div class="cell"><div class="tile"><img class="icon" src="../assets/app-icon.svg" alt="app icon"></div><span class="n">app icon</span></div>
  <div class="cell"><div class="tile"><img class="aero" src="../assets/mark-aerofoil.svg" alt="aerofoil"></div><span class="n">aerofoil · diagrams</span></div>
</body></html>
