<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="4px base grid — sp-1 through sp-16" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-5)}
  .row{display:flex;align-items:flex-end;gap:var(--sp-4)}
  .col{display:flex;flex-direction:column;align-items:flex-start;gap:var(--sp-2)}
  .bar{background:var(--ex-aqua-500);height:24px;border-radius:var(--radius-compact)}
  .n{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="col"><div class="bar" style="width:4px"></div><span class="n">1 · 4</span></div>
    <div class="col"><div class="bar" style="width:8px"></div><span class="n">2 · 8</span></div>
    <div class="col"><div class="bar" style="width:12px"></div><span class="n">3 · 12</span></div>
    <div class="col"><div class="bar" style="width:16px"></div><span class="n">4 · 16</span></div>
    <div class="col"><div class="bar" style="width:24px"></div><span class="n">6 · 24</span></div>
    <div class="col"><div class="bar" style="width:32px"></div><span class="n">8 · 32</span></div>
    <div class="col"><div class="bar" style="width:48px"></div><span class="n">12 · 48</span></div>
    <div class="col"><div class="bar" style="width:64px"></div><span class="n">16 · 64</span></div>
  </div>
</body></html>
