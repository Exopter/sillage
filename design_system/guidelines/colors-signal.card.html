<!-- @dsCard group="Colors" viewport="700x170" name="Signal colors" subtitle="Annotate information — never large decorative fills. HUD green is reserved." -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-5)}
  .row{display:flex;gap:var(--sp-3)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--sp-2)}
  .chip{height:56px;border-radius:var(--radius);border:1px solid var(--border-rule);position:relative}
  .tag{position:absolute;left:6px;bottom:6px;font-family:var(--font-mono);font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;background:rgba(7,11,13,.55);color:#fff;padding:2px 4px;border-radius:3px}
  .name{font-family:var(--font-mono);font-size:var(--fs-xs);font-weight:500;color:var(--text-body)}
  .hex{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ex-sky-500)"><span class="tag">route</span></div><span class="name">sky-500</span><span class="hex">#2EA8FF</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-aqua-500)"><span class="tag">live</span></div><span class="name">aqua-500</span><span class="hex">#2FD6C6</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-hud-green)"><span class="tag">HUD</span></div><span class="name">hud-green</span><span class="hex">#8CFF4D</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-field-500)"><span class="tag">ground</span></div><span class="name">field-500</span><span class="hex">#4F7B4E</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-amber-500)"><span class="tag">caution</span></div><span class="name">amber-500</span><span class="hex">#F2A23A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-red-600)"><span class="tag">fault</span></div><span class="name">red-600</span><span class="hex">#E63B35</span></div>
  </div>
</body></html>
