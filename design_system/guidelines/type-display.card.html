<!-- @dsCard group="Type" viewport="700x200" name="Display & headings" subtitle="Aptos — compact UI headings; large display reserved for brand pages" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-5);color:var(--text-strong)}
  .stack{display:flex;flex-direction:column;gap:var(--sp-3)}
  .line{display:flex;align-items:baseline;gap:var(--sp-4)}
  .meta{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted);width:120px;flex:none}
  .d{font-size:var(--fs-display);font-weight:700;letter-spacing:var(--ls-tight);line-height:1}
  .h1{font-size:var(--fs-h1);font-weight:700;letter-spacing:var(--ls-tight)}
  .h2{font-size:var(--fs-h2);font-weight:600}
  .h3{font-size:var(--fs-h3);font-weight:600}
</style></head>
<body>
  <div class="stack">
    <div class="line"><span class="meta">Display · 56 / 700</span><span class="d">Exopter</span></div>
    <div class="line"><span class="meta">H1 · 36 / 700</span><span class="h1">Verify flight readiness</span></div>
    <div class="line"><span class="meta">H2 · 28 / 600</span><span class="h2">Replay T0 exit</span></div>
    <div class="line"><span class="meta">H3 · 22 / 600</span><span class="h3">Glide ratio comparison</span></div>
  </div>
</body></html>
