<!-- @dsCard group="Colors" viewport="700x150" name="Carbon scale" subtitle="Primary brand black — cockpit, instrument panels, dark cards" -->
<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><link rel="stylesheet" href="../styles.css">
<style>
  body{margin:0;font-family:var(--font-ui);background:var(--surface-app);padding:var(--sp-5)}
  .row{display:flex;gap:var(--sp-3)}
  .sw{flex:1;display:flex;flex-direction:column;gap:var(--sp-2)}
  .chip{height:56px;border-radius:var(--radius);border:1px solid var(--border-rule)}
  .name{font-family:var(--font-mono);font-size:var(--fs-xs);font-weight:500;color:var(--text-body)}
  .hex{font-family:var(--font-mono);font-size:var(--fs-xs);color:var(--text-muted)}
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--ex-carbon-950)"></div><span class="name">carbon-950</span><span class="hex">#070B0D</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-carbon-900)"></div><span class="name">carbon-900</span><span class="hex">#10181A</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-carbon-800)"></div><span class="name">carbon-800</span><span class="hex">#182426</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-carbon-700)"></div><span class="name">carbon-700</span><span class="hex">#21302F</span></div>
    <div class="sw"><div class="chip" style="background:var(--ex-graphite-600)"></div><span class="name">graphite-600</span><span class="hex">#5F6C6B</span></div>
  </div>
</body></html>
